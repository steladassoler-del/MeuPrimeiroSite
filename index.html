<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">
    <title>Meu BLOG</title>
</head>
<body>
    <header>
        <h1>Meu BLOG</h1>
        <p>Stela</p>
        <p>Vou compartilhar com você meu DIA A DIA</p>
    </header>
    <main>
        <h2>Meu primeiro Post</h2>
        <p>Boas vindas ao meu blog</p>
        <img src="https://46781.cdn.simplo7.net/static/46781/sku/quadros-por-tema-paisagens-e-natureza-quadro-retangular-paisagem-litoranea-ao-anoitecer--p-1633033574294.jpg"
        alt="paisagem litoranea">
        <botton>❤️<span>0</span></botton>
    </main>
</body>
<script>
    const botoes = document.querySelectorALL("button");
    botoes.forEach(function(botao){
        botao.addEventListener("click", botaoclicado);
        function botaoclicado(){
            let texto = botao.querySelector("span");
            texto.textContent++;
        }
    })
</script>
</html>
